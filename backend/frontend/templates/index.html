<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>%%TITLE_HTML%%</title>
    <link rel="stylesheet" href="%%ASSET_PREFIX%%css/omn-go-core.css">
    <link rel="stylesheet" href="%%ASSET_PREFIX%%css/highlight.default.min.css">
    <link rel="stylesheet" href="%%ASSET_PREFIX%%css/katex.min.css">
    <script src="%%ASSET_PREFIX%%js/omn-go-core.js"></script>
    <script src="%%ASSET_PREFIX%%js/omn-go-sse.js"></script>
%%META_TAGS%%
    <script>
      var PackageName = '%%PACKAGE_JS%%';
      var PageName = '%%PAGE_NAME_JS%%';
      var Title = '%%TITLE_JS%%';
      var PAGE_EXT = '%%PAGE_EXT_JS%%';
      var currentNote = '%%PAGE_NAME_JS%%';
    </script>
%%COND_SCRIPTS%%
    <meta id="omn-go-runtime-vars-marker">
</head>
<body>
    <div id="mainUI" class="page_container">
        <div id="ptitle" class="page-header">
            <div id="hidable_header" class="collapsible-header hidden">
                <div class="header-actions">
                    <a href="%%ASSET_PREFIX%%Welcome.html"><i class="material-icons">home</i></a>
                    <button onclick="createNewPage()" class="admin-only server-only btn-create-page"><i class="material-icons">note_add</i></button>
                    <button onclick="toggleQuickPanel()" class="admin-only server-only btn-quick-note"><i class="material-icons">insert_comment</i></button>
                    <button onclick="toggleBookmarkPanel()" class="admin-only server-only btn-add-bookmark"><i class="material-icons">bookmark_add</i></button>
                    <button onclick="createNoteShortcut()" class="android-only btn-add-shortcut" title="Add to home screen"><i class="material-icons">add_to_home_screen</i></button>
                    <button onclick="refreshPage()" class="admin-only btn-refresh"><i class="material-icons">refresh</i></button>
                    <label class="admin-only server-only" style="display:flex;align-items:center;font-size:12px;margin-right:2px;cursor:pointer;color:#555;" title="Force next sync action (destructive)"><input type="checkbox" id="forceSyncCb" style="margin:0 2px 0 0;">Force</label>
                    <button onclick="syncAction('download')" class="admin-only server-only" title="Download (Pull)"><i class="material-icons">cloud_download</i></button>
                    <button onclick="syncAction('upload')" class="admin-only server-only" title="Upload (Push)"><i class="material-icons">cloud_upload</i></button>
                    <a href="#" onclick="window.location.replace('/Config.html'); return false;" class="btn-settings server-only"><i class="material-icons">settings</i></a>
                    <button id="metaToggleBtn" onclick="var p=document.getElementById('metadataPanel');p.classList.toggle('hidden');" class="btn-metadata-toggle" title="Toggle metadata"><i class="material-icons">info</i></button>
                    <button id="toggleBtn" onclick="window.location.href = window.location.pathname + '?edit=true'" class="admin-only server-only" title="Edit"><i class="material-icons">edit</i></button>
                </div>
                <div id="headerTags">%%TAGS_HTML%%</div>
            </div>
            <h4 id="pageTitle" class="page-title" onclick="toggleHeader()">
                %%TITLE_HTML%%
                <span id="title_arrow" class="title-arrow">+</span>
            </h4>
        </div>

        <div id="content" class="page-content">
            <div id="metadataPanel" class="hidden metadata-panel"></div>
            <div id="preview">%%PREVIEW_BODY%%</div>
        </div>
    </div>

    <div id="status" class="page-footer">
        <span class="version-footer-inline" id="omn-go-version-footer"></span>
        <span id="omn-go-console-footer-dot" title="JS console has messages — tap to open" style="display:none; width:10px; height:10px; border-radius:50%; background:#ff9800; cursor:pointer; flex:0 0 auto; margin-left:8px;"></span>
    </div>

    <div id="omn-go-modals-slot"></div>

    <script src="%%ASSET_PREFIX%%js/highlight.min.js"></script>
    <script src="%%ASSET_PREFIX%%js/katex.min.js"></script>
    <script src="%%ASSET_PREFIX%%js/auto-render.min.js"></script>
</body>
</html>
