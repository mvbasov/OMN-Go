<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit: %%TITLE_HTML%%</title>
    <!-- Theme variables + Material Icons font come from the shared core
         stylesheet; the runtime marker below is replaced server-side with
         the data-theme setter so there is no flash of the wrong theme. -->
    <link rel="stylesheet" href="/css/omn-go-core.css">
    <script>
      // Context for omn-go-editor.js. The note SOURCE is deliberately NOT
      // present here - the editor fetches it from /api/note on load, so a
      // rendered page never carries a second, hidden copy of its own text.
      var OMN_EDIT_NAME = '%%NAME_JS%%';
      var OMN_EDIT_EXT  = '%%PAGE_EXT_JS%%';
      var OMN_EDIT_VIEW = '%%VIEW_URL_JS%%';
    </script>
    <meta id="omn-go-runtime-vars-marker">
    <style>
        html, body { height: 100%; margin: 0; }
        body {
            display: flex; flex-direction: column;
            background: var(--bg); color: var(--text);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        .omn-editor-bar {
            display: flex; align-items: center; gap: 6px;
            padding: 6px 10px;
            background: var(--bg-band);
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .omn-editor-spacer { flex: 1 1 auto; }
        .omn-editor-bar button {
            display: inline-flex; align-items: center; justify-content: center;
            background: var(--bg-surface); color: var(--text);
            border: 1px solid var(--border-strong);
            border-radius: 4px; cursor: pointer;
            padding: 4px 8px; line-height: 1;
        }
        .omn-editor-bar button:hover { background: var(--bg-hover); }
        .omn-editor-bar button.active {
            background: var(--accent); color: #fff; border-color: var(--accent);
        }
        .omn-editor-bar button:disabled { opacity: 0.4; cursor: default; }
        .omn-editor-bar button:disabled:hover { background: var(--bg-surface); }
        .omn-editor-bar .material-icons { font-size: 20px; }
        .omn-editor-tools { display: inline-flex; gap: 4px; align-items: center; }
        .omn-editor-tools::after {
            content: ""; width: 1px; align-self: stretch;
            background: var(--border); margin: 0 4px;
        }
        #editorSave { border-color: var(--accent); color: var(--accent); font-weight: 600; }
        #editorSave:hover { background: var(--accent); color: #fff; }
        /* Editing area: a horizontal row of [line-number gutter][textarea].
           The gutter shows only when line numbers are on AND word wrap is
           off (body.ln-on) - under wrapping the two can't stay aligned, so
           the toggle is forced off while wrapping. The gutter's font-size,
           line-height and top padding must match the textarea's exactly or
           the numbers drift. */
        .omn-editor-main { display: flex; flex: 1 1 auto; min-height: 0; }
        .omn-editor-gutter {
            display: none; flex: 0 0 auto;
            box-sizing: border-box; overflow: hidden;
            padding: 12px 8px 12px 10px; margin: 0;
            text-align: right; white-space: pre;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 14px; line-height: 1.5;
            color: var(--text-dim); background: var(--bg-band);
            border-right: 1px solid var(--border);
            user-select: none; -webkit-user-select: none;
        }
        body.ln-on .omn-editor-gutter { display: block; }
        .omn-editor #editor {
            display: block; flex: 1 1 auto; min-width: 0;
            box-sizing: border-box; border: none; outline: none;
            padding: 12px 14px; margin: 0; resize: none;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 14px; line-height: 1.5; tab-size: 4;
            white-space: pre-wrap; overflow-x: hidden;
            background: var(--bg-surface); color: var(--text);
        }
        /* Word wrap off: don't wrap, scroll horizontally instead. */
        .omn-editor #editor.nowrap { white-space: pre; overflow-x: auto; }
        .omn-editor-status {
            display: flex; align-items: center; gap: 8px;
            padding: 4px 12px; font-size: 12px;
            background: var(--bg-band); border-top: 1px solid var(--border);
            color: var(--text-faint); min-height: 1.2em;
        }
        /* File name (left), shown persistently; transient Loading/Saving/
           error text reuses this span. Unsaved state is the dot, not text. */
        #editorStatus {
            flex: 1 1 auto; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }
        .editor-status-error { color: #ff5555; }
        .editor-status-ok    { color: #3fb950; }
        /* State dot at the right: green = saved, red = unsaved changes.
           Pure CSS circle (border-radius:50%), no image asset. */
        .omn-editor-dot {
            flex: 0 0 auto; width: 10px; height: 10px;
            border-radius: 50%; background: var(--text-dim);
        }
        .omn-editor-dot.clean   { background: #3fb950; }
        .omn-editor-dot.dirty   { background: #ff5555; }
        .omn-editor-dot.loading { background: var(--text-dim); }
    </style>
</head>
<body class="omn-editor">
    <!-- The note name is shown in the status bar at the bottom ("Editing
         <name>"), so it is deliberately not repeated here. There is a single
         exit control (the × cancel button, which prompts on unsaved changes);
         a separate back arrow would duplicate it. -->
    <div class="omn-editor-bar">
        <span class="omn-editor-tools" id="editorTools"><!-- tool buttons injected by omn-go-editor.js --></span>
        <span class="omn-editor-spacer"></span>
        <button id="editorSave" type="button" title="Save (Ctrl+S)"><i class="material-icons">save</i></button>
        <button id="editorCancel" type="button" title="Cancel"><i class="material-icons">close</i></button>
    </div>
    <div class="omn-editor-main">
        <div id="editorGutter" class="omn-editor-gutter" aria-hidden="true"></div>
        <textarea id="editor" spellcheck="false" placeholder="Loading…" autocapitalize="off" autocomplete="off" autocorrect="off"></textarea>
    </div>
    <div class="omn-editor-status">
        <span id="editorStatus">Loading…</span>
        <span id="editorDot" class="omn-editor-dot loading" title="Save state"></span>
    </div>

    <script src="/js/omn-go-editor.js"></script>
</body>
</html>
