<div class="config-panel">
    <h2 class="config-title">Database Backups</h2>
    <div class="config-field">
        <span class="config-hint">Whole-database snapshots stored as one JSONL file each under <code>html/db_backup/&lt;db&gt;/</code>. Backups travel between devices through the normal git sync (databases named <code>local-*</code> stay on this device). Restore always replaces the whole database with the chosen backup.</span>
    </div>
    <div id="dbBackupList">Loading…</div>
</div>

<div id="dbbModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;">
    <div style="max-width:480px;margin:10vh auto;background:var(--bg-color,#fff);color:inherit;border-radius:8px;padding:1em 1.2em;box-shadow:0 4px 24px rgba(0,0,0,0.4);">
        <h3 id="dbbModalTitle" style="margin-top:0;"></h3>
        <div id="dbbModalBody" style="max-height:50vh;overflow:auto;"></div>
        <div style="text-align:right;margin-top:1em;">
            <button type="button" onclick="dbbCloseModal()">Cancel</button>
            <button type="button" id="dbbModalOk" style="margin-left:0.6em;font-weight:bold;"></button>
        </div>
    </div>
</div>

<style>
.dbb-row { display:flex; align-items:center; gap:0.6em; padding:0.5em 0.2em; border-bottom:1px solid rgba(128,128,128,0.25); flex-wrap:wrap; }
.dbb-dot { width:0.85em; height:0.85em; border-radius:50%; flex:0 0 auto; display:inline-block; }
.dbb-name { font-weight:bold; min-width:8em; }
.dbb-meta { opacity:0.75; font-size:0.9em; }
.dbb-details { margin:0.3em 0 0.8em 1.6em; font-size:0.92em; }
.dbb-bk { display:flex; align-items:center; gap:0.6em; padding:0.25em 0; flex-wrap:wrap; }
.dbb-btn { cursor:pointer; }
.dbb-state { font-size:0.85em; padding:0.05em 0.5em; border-radius:1em; border:1px solid rgba(128,128,128,0.4); }
</style>

<script>
(function() {
    'use strict';
    if (window.location.protocol === 'file:') {
        document.getElementById('dbBackupList').textContent =
            'Database backups need the OMN-Go server (page opened via file://).';
        return;
    }

    var STATE = {
        insync:       { color: '#2e7d32', label: 'in sync',        hint: 'Database matches its newest backup.' },
        dirty:        { color: '#f9a825', label: 'not backed up',  hint: 'Database has changes newer than any backup.' },
        backup_newer: { color: '#1565c0', label: 'backup newer',   hint: 'Newest backup is newer than the database (pulled from another device?). Consider Restore.' },
        missing:      { color: '#1565c0', label: 'no database',    hint: 'Backups exist but the database file does not (fresh device). It is restored automatically on first use, or restore manually here.' },
        none:         { color: '#9e9e9e', label: 'no backups',     hint: 'No backups exist yet for this database.' },
        invalid:      { color: '#c62828', label: 'invalid backup', hint: 'The newest backup file cannot be parsed (damaged or conflicted?).' }
    };
    var lastData = null;

    function esc(s) {
        return String(s).replace(/[&<>"]/g, function(c) {
            return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
        });
    }
    function kb(n) { return n >= 1024 ? (n / 1024).toFixed(1) + ' KB' : n + ' B'; }
    function ts(iso) { return iso ? iso.replace('T', ' ').replace(/(:\d\d)(\.\d+)?(Z|[+-].*)$/, '$1') : '—'; }

    function dbbShowModal(title, bodyHTML, okLabel, onOk) {
        document.getElementById('dbbModalTitle').textContent = title;
        document.getElementById('dbbModalBody').innerHTML = bodyHTML;
        var ok = document.getElementById('dbbModalOk');
        ok.textContent = okLabel;
        ok.onclick = function() { dbbCloseModal(); onOk(); };
        document.getElementById('dbbModal').style.display = 'block';
    }
    window.dbbCloseModal = function() {
        document.getElementById('dbbModal').style.display = 'none';
    };

    async function api(url, opts) {
        var res = await fetch(url, opts || {});
        var data = await res.json();
        if (data.status !== 'success') throw new Error(data.message || 'request failed');
        return data;
    }

    window.dbbBackupNow = function(name) {
        var db = (lastData.databases || []).find(function(d) { return d.name === name; });
        var willPrune = db && db.backups.length >= lastData.prune_depth;
        var body = '<p>Create a new backup of <b>' + esc(name) + '</b>?</p>';
        if (willPrune) {
            var oldest = db.backups[db.backups.length - 1].file;
            body += '<p>⚠ This exceeds the prune depth (' + lastData.prune_depth +
                    '): the oldest backup <code>' + esc(oldest) + '</code> will be <b>deleted</b>.';
            if (name.indexOf('local-') === 0) {
                body += '<br><b>This is a local database: its backups are not in git history — the pruned file is unrecoverable.</b>';
            } else {
                body += '<br>(For synced databases the pruned file still exists in git history.)';
            }
            body += '</p>';
        }
        dbbShowModal('Backup ' + name, body, 'Create backup', async function() {
            try {
                await api('/api/db/backup?db=' + encodeURIComponent(name), { method: 'POST' });
                load();
            } catch (e) { alert('Backup failed: ' + e.message); }
        });
    };

    window.dbbRestore = function(name, file) {
        var db = (lastData.databases || []).find(function(d) { return d.name === name; });
        var bk = db.backups.find(function(b) { return b.file === file; });
        var cur = db.sqlite_exists
            ? kb(db.size) + ', last modified ' + ts(db.mtime)
            : 'does not exist yet';
        var body =
            '<p>Replace the <b>entire</b> database <b>' + esc(name) + '</b> with this backup?</p>' +
            '<table style="border-collapse:collapse;">' +
            '<tr><td style="padding:0.15em 0.8em 0.15em 0;">Current database:</td><td>' + esc(cur) + '</td></tr>' +
            '<tr><td style="padding:0.15em 0.8em 0.15em 0;">Backup:</td><td><code>' + esc(file) + '</code></td></tr>' +
            '<tr><td></td><td>created ' + ts(bk.created) + ' on <b>' + esc(bk.hostname || '?') + '</b>, ' +
            bk.objects + ' objects, ' + bk.rows + ' rows, ' + kb(bk.size) + '</td></tr>' +
            '</table>' +
            '<p><b>The current database contents will be lost.</b> (You can create a backup of the current state first.)</p>';
        dbbShowModal('Restore ' + name, body, 'Replace database', async function() {
            try {
                await api('/api/db/restore?db=' + encodeURIComponent(name) +
                          '&file=' + encodeURIComponent(file), { method: 'POST' });
                load();
            } catch (e) { alert('Restore failed: ' + e.message); }
        });
    };

    window.dbbToggle = function(name) {
        var el = document.getElementById('dbb-details-' + name);
        el.style.display = el.style.display === 'none' ? 'block' : 'none';
    };

    function render(data) {
        lastData = data;
        (data.databases || []).forEach(function(db) { if (!db.backups) db.backups = []; });
        var out = ['<div class="dbb-meta" style="padding:0.3em 0.2em;">This device: <b>' +
                   esc(data.hostname) + '</b> · keeping newest ' + data.prune_depth +
                   ' backup(s) per database (Config page)</div>'];
        if (!data.databases || data.databases.length === 0) {
            out.push('<p>No databases yet. A database appears here after a note script first uses one.</p>');
        }
        (data.databases || []).forEach(function(db) {
            var st = STATE[db.state] || STATE.none;
            out.push(
                '<div class="dbb-row">' +
                '<span class="dbb-dot" style="background:' + st.color + ';" title="' + esc(st.hint) + '"></span>' +
                '<span class="dbb-name">' + esc(db.name) + '</span>' +
                '<span class="dbb-state" title="' + esc(st.hint) + '">' + st.label + '</span>' +
                '<span class="dbb-meta">' + (db.sqlite_exists ? kb(db.size) + ' · ' + ts(db.mtime) : 'no .sqlite file') +
                ' · ' + db.backups.length + ' backup(s)</span>' +
                '<span style="flex:1"></span>' +
                '<button type="button" class="dbb-btn" onclick="dbbToggle(\'' + db.name + '\')">Details</button>' +
                (db.sqlite_exists ? '<button type="button" class="dbb-btn" onclick="dbbBackupNow(\'' + db.name + '\')">Backup now</button>' : '') +
                '</div>');
            var det = ['<div class="dbb-details" id="dbb-details-' + db.name + '" style="display:none;">'];
            if (db.backups.length === 0) det.push('<div class="dbb-meta">No backups.</div>');
            db.backups.forEach(function(bk) {
                det.push('<div class="dbb-bk">' +
                    '<code>' + esc(bk.file) + '</code>' +
                    (bk.valid
                        ? '<span class="dbb-meta">created ' + ts(bk.created) + ' on ' + esc(bk.hostname || '?') +
                          ' · ' + bk.objects + ' obj · ' + bk.rows + ' rows · ' + kb(bk.size) + '</span>'
                        : '<span class="dbb-meta" style="color:#c62828;">invalid: ' + esc(bk.error || '?') + '</span>') +
                    '<span style="flex:1"></span>' +
                    (bk.valid ? '<button type="button" class="dbb-btn" onclick="dbbRestore(\'' + db.name + '\',\'' + bk.file + '\')">Restore</button>' : '') +
                    '<a href="/db_backup/' + encodeURIComponent(db.name) + '/' + encodeURIComponent(bk.file) +
                    '" download class="dbb-meta">download</a>' +
                    '</div>');
            });
            det.push('</div>');
            out.push(det.join(''));
        });
        document.getElementById('dbBackupList').innerHTML = out.join('');
    }

    async function load() {
        try {
            render(await api('/api/db/backups'));
        } catch (e) {
            document.getElementById('dbBackupList').textContent = 'Failed to load: ' + e.message;
        }
    }
    load();
})();
</script>
