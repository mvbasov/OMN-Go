name: Build OMN-Go

on:
  push:
    branches: [master, DS]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${KEYSTORE_BASE64}" | base64 -d > android/app/omn-go.keystore

      # Built from Dockerfile.ci - a merged, single-BuildKit-graph version
      # of Dockerfile.base + Dockerfile (see that file's header comment
      # for why). setup-buildx-action's builder uses the `docker-container`
      # driver, which runs BuildKit in an isolated container that does NOT
      # share the runner's local Docker daemon image store: two separate
      # `docker buildx build` calls, where the second does
      # `FROM omn-go-base:latest`, fail trying to PULL that name from a
      # registry instead of reusing what the first `--load`ed. Building
      # both stages as one graph sidesteps that - there's no cross-
      # invocation image reference for it to fail to resolve.
      #
      # --cache-from/--cache-to type=gha persists BOTH the layer cache and
      # the /go/pkg/mod, go-build, and gradle cache-mount contents in
      # GitHub's Actions cache between workflow runs - without it, every
      # run would start cold regardless of how the Dockerfile is laid out,
      # since GitHub Actions runners are fresh VMs each time.
      # mode=max also caches the base_env stage's layers, not just the
      # final image, so an unchanged go.mod/toolchain setup is skipped
      # entirely on the next run, not just de-duplicated at the Go-module
      # level.
      #
      # --load makes the result available to the classic `docker create`/
      # `docker cp` steps further down.
      - name: Build Docker image
        run: |
          docker buildx build \
            -f Dockerfile.ci \
            -t omn-go-builder:latest \
            --build-arg KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD}" \
            --build-arg KEY_ALIAS="${KEY_ALIAS}" \
            --build-arg KEY_PASSWORD="${KEY_PASSWORD}" \
            --cache-from type=gha,scope=omngo \
            --cache-to type=gha,mode=max,scope=omngo \
            --load \
            .
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' backend/version.go)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

      - name: Extract artifacts from container
        run: |
          mkdir -p artifacts
          docker create --name omn-go-tmp omn-go-builder:latest
          docker cp omn-go-tmp:/app/bin/. artifacts/
          docker rm omn-go-tmp
          ls -la artifacts/

