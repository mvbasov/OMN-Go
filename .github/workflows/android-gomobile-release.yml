name: Build OMN-Go

on:
  push:
    branches: [master, DS]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${KEYSTORE_BASE64}" | base64 -d > android/app/omn-go.keystore

      # --cache-from/--cache-to type=gha is what makes the Dockerfile
      # changes actually pay off in CI: GitHub Actions runners are
      # ephemeral, so without an external cache backend, every run starts
      # with an empty BuildKit cache and empty /go/pkg/mod cache mounts
      # regardless of how well the Dockerfiles are laid out - go.mod not
      # having changed wouldn't save anything, because there'd be nothing
      # cached to reuse. type=gha persists both the layer cache and the
      # cache-mount contents (module cache, go-build cache, gradle cache)
      # in GitHub's Actions cache between workflow runs.
      #
      # Separate scopes (base / builder) so the two images' caches don't
      # evict each other under GitHub's total per-repo cache size limit.
      #
      # --load is required because the extract/release steps below use
      # the classic `docker create`/`docker cp` against the image name -
      # without --load, a buildx build result isn't available to the
      # local Docker daemon.
      - name: Build Docker base image
        run: |
          docker buildx build \
            -f Dockerfile.base \
            -t omn-go-base:latest \
            --cache-from type=gha,scope=omngo-base \
            --cache-to type=gha,mode=max,scope=omngo-base \
            --load \
            .

      - name: Build Docker image
        run: |
          docker buildx build \
            -t omn-go-builder:latest \
            --build-arg KEYSTORE_PASSWORD="${KEYSTORE_PASSWORD}" \
            --build-arg KEY_ALIAS="${KEY_ALIAS}" \
            --build-arg KEY_PASSWORD="${KEY_PASSWORD}" \
            --cache-from type=gha,scope=omngo-builder \
            --cache-to type=gha,mode=max,scope=omngo-builder \
            --load \
            .
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' backend/version.go)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

      - name: Extract artifacts from container
        run: |
          mkdir -p artifacts
          docker create --name omn-go-tmp omn-go-builder:latest
          docker cp omn-go-tmp:/app/bin/. artifacts/
          docker rm omn-go-tmp
          ls -la artifacts/

