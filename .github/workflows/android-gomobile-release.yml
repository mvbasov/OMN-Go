name: Build OMN-Go

on:
  push:
    branches: [master, DS]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore Android keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${KEYSTORE_BASE64}" | base64 -d > android/app/omn-go.keystore

      - name: Build Docker base image
        run: docker build -f Dockerfile.base -t omn-go-base:latest .

      - name: Build Docker image
        run:  docker build -t omn-go-builder:latest --build-arg KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD} --build-arg KEY_ALIAS=${KEY_ALIAS} --build-arg KEY_PASSWORD=${KEY_PASSWORD} .
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' backend/version.go)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

      - name: Extract artifacts from container
        run: |
          mkdir -p artifacts
          docker create --name omn-go-tmp omn-go-builder:latest
          docker cp omn-go-tmp:/app/bin/. artifacts/
          docker rm omn-go-tmp
          ls -la artifacts/

#      - name: Upload desktop binaries
#        uses: actions/upload-artifact@v4
#        with:
#          name: omn-go-desktop-${{ steps.version.outputs.version }}
#          path: |
#            artifacts/omn-go-*-desktop-*
#          if-no-files-found: ignore

#      - name: Upload Android APKs
#        uses: actions/upload-artifact@v4
#        with:
#          name: omn-go-android-${{ steps.version.outputs.version }}
#          path: |
#            artifacts/omn-go-*-release.apk
#            artifacts/omn-go-*-universal-release.apk
#          if-no-files-found: ignore

#      - name: Upload all artifacts (full)
#        uses: actions/upload-artifact@v4
#        with:
#          name: omn-go-all-${{ steps.version.outputs.version }}
#          path: artifacts/

      - name: Create Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: OMN-Go ${{ steps.version.outputs.version }}
          files: |
            artifacts/omn-go-*-desktop-*
            artifacts/omn-go-*-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
