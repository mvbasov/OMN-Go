name: Build OMN-Go

on:
  push:
    branches: [main, master, DS]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t omn-go:latest .

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep -oP 'APP_VERSION\s*=\s*"\K[^"]+' backend/version.go)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

      - name: Extract artifacts from container
        run: |
          mkdir -p artifacts
          docker create --name omn-go-tmp omn-go:latest
          docker cp omn-go-tmp:/app/bin/. artifacts/
          docker rm omn-go-tmp
          ls -la artifacts/

      - name: Upload desktop binaries
        uses: actions/upload-artifact@v4
        with:
          name: omn-go-desktop-${{ steps.version.outputs.version }}
          path: |
            artifacts/omn-go-*-desktop-*
          if-no-files-found: ignore

      - name: Upload Android APKs
        uses: actions/upload-artifact@v4
        with:
          name: omn-go-android-${{ steps.version.outputs.version }}
          path: |
            artifacts/omn-go-*-release.apk
            artifacts/omn-go-*-universal-release.apk
          if-no-files-found: ignore

      - name: Upload all artifacts (full)
        uses: actions/upload-artifact@v4
        with:
          name: omn-go-all-${{ steps.version.outputs.version }}
          path: artifacts/
