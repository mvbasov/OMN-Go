name: Android Gomobile Release

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: golang:1.26-bookworm # Runs the steps inside this image environment
    steps:
      - uses: actions/checkout@v4
      
      # Alternatively, if you want to use your exact multi-stage Dockerfile setup:
      - name: Build via Docker
        run: |
          docker build -t omn-go-builder .
          docker create --name extract omn-go-builder
          docker cp extract:/app/bin ./bin
          docker rm extract

     # --- Create Release with All Assets ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Upload everything in the release-assets folder
          files: |
            bin/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
