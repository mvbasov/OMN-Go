<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMN-Go Icon Variants Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        svg {
            max-width: 100%;
            height: auto;
            border-radius: 20%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            background: #fff49d; /* Match the BG layer */
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 p-8 font-sans">

    <div class="max-w-6xl mx-auto">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">OMN-Go Icon Previews</h1>
            <p class="text-gray-600 mt-2">Live SVG patching. Adjust the "Go" text positioning, colors, and visible layers below.</p>
        </div>

        <!-- Controls -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6 grid grid-cols-1 md:grid-cols-5 gap-6">
            <div>
                <label class="block text-sm font-semibold mb-2">Load SVG File</label>
                <input type="file" id="svgUpload" accept=".svg" class="w-full text-sm text-gray-500 file:mr-2 file:py-2 file:px-2 file:rounded file:border-0 file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Standard App Color</label>
                <input type="color" id="stdColor" value="#0f0fc8" class="w-full h-10 rounded cursor-pointer">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Text X Position</label>
                <input type="range" id="posX" min="200" max="500" value="330" class="w-full">
                <div class="text-xs text-gray-500 mt-1 text-center" id="valX">330</div>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Text Y Position</label>
                <input type="range" id="posY" min="400" max="700" value="610" class="w-full">
                <div class="text-xs text-gray-500 mt-1 text-center" id="valY">610</div>
            </div>
            <div>
                <label class="block text-sm font-semibold mb-2">Font Size</label>
                <input type="range" id="fontSize" min="100" max="300" value="164" class="w-full">
                <div class="text-xs text-gray-500 mt-1 text-center" id="valSize">164</div>
            </div>
        </div>

        <!-- Dynamic Layer Controls -->
        <div id="layerControls" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-8 hidden">
            <!-- Checkboxes injected here via JS -->
        </div>

        <!-- Previews -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
            
            <!-- F-Droid Variant -->
            <div class="flex flex-col items-center">
                <h2 class="text-xl font-bold mb-1">net.basov.omngo.fdroid</h2>
                <p class="text-sm text-gray-500 mb-6">Original Cyan (#00cbff)</p>
                <div id="preview-fdroid" class="w-64 h-64 md:w-80 md:h-80 relative">
                    <div class="absolute inset-0 flex items-center justify-center text-sm text-gray-400 border-2 border-dashed border-gray-300 rounded-[20%]">Waiting for SVG file...</div>
                </div>
            </div>

            <!-- Standard Variant -->
            <div class="flex flex-col items-center">
                <h2 class="text-xl font-bold mb-1">net.basov.omngo</h2>
                <p class="text-sm text-gray-500 mb-6">Standard Build (Custom Color)</p>
                <div id="preview-standard" class="w-64 h-64 md:w-80 md:h-80 relative">
                    <div class="absolute inset-0 flex items-center justify-center text-sm text-gray-400 border-2 border-dashed border-gray-300 rounded-[20%]">Waiting for SVG file...</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let decodedSvg = "";
        let svgLayers = [];

        // Regex to strip the old 'F' text element from layer6
        // It specifically matches the <g aria-label="F" ...> ... </g> block inside the SVG
        const layer6Regex = /<g\s+aria-label="F"[\s\S]*?<\/g>/;

        function toggleLayer(id, isChecked) {
            const layer = svgLayers.find(l => l.id === id);
            if (layer) layer.visible = isChecked;
            updatePreviews();
        }

        function extractLayers(svgStr) {
            // Find all Inkscape layers
            const layerTags = svgStr.match(/<g\s+[^>]*inkscape:groupmode="layer"[^>]*>/g) || [];
            
            svgLayers = layerTags.map(tag => {
                const idMatch = tag.match(/id="([^"]+)"/);
                const labelMatch = tag.match(/inkscape:label="([^"]+)"/);
                
                // Determine if Inkscape hid this layer by default
                const isHidden = tag.includes('display="none"') || tag.includes('display:none');
                
                return {
                    id: idMatch ? idMatch[1] : null,
                    label: labelMatch ? labelMatch[1] : (idMatch ? idMatch[1] : 'Unknown'),
                    visible: !isHidden
                };
            }).filter(l => l.id); // Filter out layers without valid IDs

            // Build UI Checkboxes
            const controlsDiv = document.getElementById('layerControls');
            if (svgLayers.length > 0) {
                controlsDiv.classList.remove('hidden');
                let html = '<label class="block text-sm font-semibold mb-4">Toggle SVG Layers</label><div class="flex flex-wrap gap-x-8 gap-y-4">';
                
                svgLayers.forEach(layer => {
                    html += `
                        <label class="flex items-center space-x-2 text-sm cursor-pointer select-none">
                            <input type="checkbox" class="rounded w-4 h-4 text-blue-600 focus:ring-blue-500 border-gray-300 cursor-pointer" 
                                value="${layer.id}" ${layer.visible ? 'checked' : ''} 
                                onchange="toggleLayer('${layer.id}', this.checked)">
                            <span class="font-medium text-gray-700">${layer.label}</span>
                        </label>
                    `;
                });
                html += '</div>';
                controlsDiv.innerHTML = html;
            } else {
                controlsDiv.classList.add('hidden');
            }
        }

        function updatePreviews() {
            if (!decodedSvg) return;

            const x = document.getElementById('posX').value;
            const y = document.getElementById('posY').value;
            const size = document.getElementById('fontSize').value;
            const stdColor = document.getElementById('stdColor').value;

            document.getElementById('valX').innerText = x;
            document.getElementById('valY').innerText = y;
            document.getElementById('valSize').innerText = size + "px";

            // 1. Generate the CSS string to explicitly hide or show layers based on checkbox state.
            // Using !important forces the SVG to obey our checkboxes, ignoring Inkscape's internal styling.
            let layerCSS = "";
            svgLayers.forEach(layer => {
                if (!layer.visible) {
                    layerCSS += `#${layer.id} { display: none !important; }\n`;
                } else {
                    layerCSS += `#${layer.id} { display: inline !important; }\n`;
                }
            });

            // Base SVG element generator for the injected 'Go' text
            const generateGoText = (color) => {
                return `<text x="${x}" y="${y}" font-family="'Arial', sans-serif" font-weight="900" font-size="${size}px" fill="${color}" letter-spacing="-5">Go</text>`;
            };

            const processSvgVariant = (svgStr, color) => {
                // Remove the old 'F' and inject the new 'Go'
                let processed = svgStr.replace(layer6Regex, generateGoText(color));
                
                // Safely inject our dynamically generated Layer Control CSS right before closing </svg>
                if (layerCSS) {
                    processed = processed.replace(/<\/svg>/i, `<style>${layerCSS}</style></svg>`);
                }
                return processed;
            };

            // Render Variants
            document.getElementById('preview-fdroid').innerHTML = processSvgVariant(decodedSvg, '#00cbff');
            document.getElementById('preview-standard').innerHTML = processSvgVariant(decodedSvg, stdColor);
        }

        // SVG File Upload Handler
        document.getElementById('svgUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                decodedSvg = event.target.result;
                extractLayers(decodedSvg);
                updatePreviews();
            };
            reader.readAsText(file);
        });

        // Event listeners for live slider/color updates
        document.getElementById('posX').addEventListener('input', updatePreviews);
        document.getElementById('posY').addEventListener('input', updatePreviews);
        document.getElementById('fontSize').addEventListener('input', updatePreviews);
        document.getElementById('stdColor').addEventListener('input', updatePreviews);

    </script>
</body>
</html>
