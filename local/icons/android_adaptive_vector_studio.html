<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Adaptive Vector Studio</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%20100%20100%22%3E%3Cstyle%3E.bg%7Bfill%3A%23333333%7D.st%7Bstroke%3A%23ffffff%3Bfill%3Anone%7D.fi%7Bfill%3A%23ffffff%7D.ig%7Bfill%3A%23333333%7D%40media%28prefers-color-scheme%3Alight%29%7B.bg%7Bfill%3A%23e5e5e5%7D.st%7Bstroke%3A%231a1a1a%7D.fi%7Bfill%3A%231a1a1a%7D.ig%7Bfill%3A%23e5e5e5%7D%7D%3C%2Fstyle%3E%3Crect%20width%3D%22100%22%20height%3D%22100%22%20rx%3D%2222%22%20class%3D%22bg%22%2F%3E%3Crect%20x%3D%2215%22%20y%3D%2215%22%20width%3D%2270%22%20height%3D%2270%22%20rx%3D%228%22%20class%3D%22st%22%20stroke-width%3D%226%22%2F%3E%3Ccircle%20cx%3D%2235%22%20cy%3D%2235%22%20r%3D%227%22%20class%3D%22fi%22%2F%3E%3Cpath%20d%3D%22M%2018%2080%20L%2045%2045%20L%2065%2070%20L%2072%2062%20L%2082%2075%22%20class%3D%22st%22%20stroke-width%3D%226%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%2F%3E%3Ccircle%20cx%3D%2270%22%20cy%3D%2270%22%20r%3D%2214%22%20class%3D%22ig%22%2F%3E%3Ccircle%20cx%3D%2270%22%20cy%3D%2270%22%20r%3D%2214%22%20fill%3D%22none%22%20stroke%3D%22%2300cbff%22%20stroke-width%3D%226%22%2F%3E%3Cline%20x1%3D%2280%22%20y1%3D%2280%22%20x2%3D%2294%22%20y2%3D%2294%22%20stroke%3D%22%2300cbff%22%20stroke-width%3D%228%22%20stroke-linecap%3D%22round%22%2F%3E%3C%2Fsvg%3E">
    <style>
        /* Scoped Vanilla CSS with Light/Dark Mode Variables */
        :root, .vp-app-root {
            --vp-primary: #00cbff;
            --vp-primary-dark: #009ecc;
            --vp-bg-color: #f8f9fa;
            --vp-surface: #ffffff;
            --vp-text-main: #333333;
            --vp-text-strong: #1a1a1a;
            --vp-text-muted: #6c757d;
            --vp-border: #dee2e6;
            --vp-danger: #d32f2f;
            --vp-upload-bg: #fafafa;
            --vp-upload-hover: #f0fbff;
            --vp-checker-bg: #e5e5e5;
            --vp-checker-fg: #f0f0f0;
            --vp-input-bg: #ffffff;
            --vp-shadow: rgba(0,0,0,0.05);
            --vp-shadow-strong: rgba(0,0,0,0.15);
        }

        @media (prefers-color-scheme: dark) {
            :root, .vp-app-root {
                --vp-bg-color: #121212;
                --vp-surface: #1e1e1e;
                --vp-text-main: #e0e0e0;
                --vp-text-strong: #ffffff;
                --vp-text-muted: #9e9e9e;
                --vp-border: #333333;
                --vp-danger: #ef5350;
                --vp-upload-bg: #242424;
                --vp-upload-hover: #1c2e36;
                --vp-checker-bg: #1a1a1a;
                --vp-checker-fg: #242424;
                --vp-input-bg: #2d2d2d;
                --vp-shadow: rgba(0,0,0,0.3);
                --vp-shadow-strong: rgba(0,0,0,0.5);
            }
        }

        body {
            background-color: var(--vp-bg-color);
            margin: 0;
            padding: 0;
        }

        .vp-app-root {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            line-height: 1.6;
            color: var(--vp-text-main);
            background: var(--vp-bg-color);
            padding: 2rem;
            box-sizing: border-box;
            max-width: 1000px;
            margin: 0 auto;
        }

        .vp-app-root * { box-sizing: border-box; }

        .vp-header {
            margin-top: 0;
            color: var(--vp-text-strong);
            border-bottom: 2px solid var(--vp-border);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        /* Upload Zone */
        .vp-upload-area {
            border: 2px dashed var(--vp-border);
            border-radius: 8px;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--vp-upload-bg);
            margin-bottom: 1.5rem;
        }

        .vp-upload-area:hover, .vp-upload-area.vp-dragover {
            border-color: var(--vp-primary);
            background: var(--vp-upload-hover);
        }

        .vp-upload-area input[type="file"] { display: none; }

        /* Workspace Grid */
        .vp-workspace {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 2rem;
            align-items: start;
        }

        /* Controls Panel */
        .vp-panel {
            background: var(--vp-surface);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--vp-border);
            box-shadow: 0 4px 12px var(--vp-shadow);
        }

        .vp-panel h3 {
            margin-top: 0;
            color: var(--vp-text-strong);
            font-size: 1.1rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--vp-border);
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .vp-control-group { margin-bottom: 1rem; }

        .vp-control-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            color: var(--vp-text-muted);
        }

        .vp-control-group input[type="range"],
        .vp-control-group input[type="color"],
        .vp-control-group select {
            width: 100%;
            background: var(--vp-input-bg);
            border: 1px solid var(--vp-border);
            color: var(--vp-text-main);
            border-radius: 4px;
        }

        .vp-control-group input[type="color"] {
            height: 40px;
            padding: 2px;
            cursor: pointer;
        }
        
        .vp-control-group select {
            padding: 0.5rem;
            font-size: 0.95rem;
        }

        .vp-control-row { display: flex; gap: 1rem; }
        .vp-control-row > div { flex: 1; }

        /* Layers Table */
        .vp-layer-list {
            margin-bottom: 1.5rem;
            border: 1px solid var(--vp-border);
            border-radius: 6px;
            overflow-x: auto;
            display: flex;
            flex-direction: column;
        }

        .vp-layer-header, .vp-layer-item {
            display: grid;
            grid-template-columns: 35px 65px 65px 70px 70px 1fr;
            align-items: center;
            padding: 0.5rem;
            border-bottom: 1px solid var(--vp-border);
            min-width: 570px;
        }

        .vp-layer-header {
            background: var(--vp-surface);
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--vp-text-muted);
        }

        .vp-layer-item {
            font-size: 0.9rem;
            background: var(--vp-input-bg);
        }

        .vp-layer-item:last-child { border-bottom: none; }

        .vp-col-vis, .vp-col-bg, .vp-col-fg, .vp-col-target, .vp-col-order {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3px;
            text-align: center;
        }

        .vp-btn-icon {
            background: transparent;
            border: 1px solid var(--vp-border);
            border-radius: 4px;
            cursor: pointer;
            padding: 2px 6px;
            color: var(--vp-text-main);
            font-size: 0.75rem;
            transition: background 0.2s;
        }
        .vp-btn-icon:hover:not(:disabled) {
            background: var(--vp-primary);
            color: #000;
        }
        .vp-btn-icon:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .vp-col-name {
            padding-left: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            min-width: 0;
        }

        .vp-layer-item input[type="radio"], .vp-layer-item input[type="checkbox"] {
            margin: 0;
            cursor: pointer;
        }

        .vp-layer-item .vp-layer-label {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }

        .vp-text-inline {
            flex: 1;
            min-width: 60px;
            padding: 0.25rem 0.5rem;
            background: var(--vp-bg-color);
            border: 1px solid var(--vp-border);
            color: var(--vp-text-main);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.85rem;
        }

        .vp-btn {
            flex: 1;
            padding: 0.8rem;
            background: var(--vp-primary);
            color: #000;
            font-weight: bold;
            text-align: center;
            border: 2px solid var(--vp-primary);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .vp-btn:hover:not(:disabled) { background: var(--vp-primary-dark); border-color: var(--vp-primary-dark); }
        
        .vp-btn-outline {
            background: transparent;
            color: var(--vp-primary);
        }
        .vp-btn-outline:hover:not(:disabled) {
            background: rgba(0, 203, 255, 0.1);
            color: var(--vp-primary-dark);
        }

        .vp-btn:disabled, .vp-btn.vp-disabled-btn {
            opacity: 0.5;
            cursor: not-allowed;
            background: var(--vp-border);
            color: var(--vp-text-muted);
            border-color: var(--vp-border);
        }

        /* Preview Area */
        .vp-preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: sticky;
            top: 2rem;
        }

        .vp-icon-viewport {
            width: 100%;
            max-width: 280px;
            aspect-ratio: 1 / 1;
            position: relative;
            background-color: var(--vp-checker-bg);
            background-image: 
                linear-gradient(45deg, var(--vp-checker-fg) 25%, transparent 25%), 
                linear-gradient(135deg, var(--vp-checker-fg) 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, var(--vp-checker-fg) 75%), 
                linear-gradient(135deg, transparent 75%, var(--vp-checker-fg) 75%);
            background-size: 20px 20px;
            background-position: 0 0, 10px 0, 10px -10px, 0px 10px;
            box-shadow: 0 12px 24px var(--vp-shadow-strong);
            perspective: 1000px;
            touch-action: none;
            margin-bottom: 1.5rem;
        }

        .vp-icon-mask {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            transition: clip-path 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), border-radius 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-style: preserve-3d;
            border: 1px solid rgba(0,0,0,0.1);
        }

        @media (prefers-color-scheme: dark) {
            .vp-icon-mask { border-color: rgba(255,255,255,0.05); }
        }

        .vp-layer {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease-out, opacity 0.2s;
            pointer-events: none;
        }

        .vp-layer svg { width: 100%; height: 100%; }

        .vp-layer-placeholder {
            color: var(--vp-text-muted);
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Shape Classes */
        .vp-shape-circle { border-radius: 50%; clip-path: none; }
        .vp-shape-square { border-radius: 0; clip-path: none; }
        .vp-shape-rounded { border-radius: 20%; clip-path: none; }
        .vp-shape-teardrop { border-radius: 50% 50% 0 50%; clip-path: none; }
        .vp-shape-squircle { border-radius: 0; clip-path: url(#vp-squircle-path); }

        .vp-error {
            color: var(--vp-danger);
            background: var(--vp-error-bg);
            padding: 1rem;
            border-radius: 6px;
            display: none;
            margin-bottom: 1.5rem;
            font-weight: 500;
            border-left: 4px solid var(--vp-danger);
        }

        .vp-bg-white-override {
            background-color: #ffffff !important;
            background-image: none !important;
        }

        @media (max-width: 768px) {
            .vp-workspace { grid-template-columns: 1fr; }
            .vp-preview-section { order: -1; position: relative; top: 0; }
            .vp-control-row { flex-direction: column; gap: 0; }
        }
    </style>
</head>
<body>

    <svg width="0" height="0" style="position:absolute;">
        <defs>
            <clipPath id="vp-squircle-path" clipPathUnits="objectBoundingBox">
                <path d="M .5 0 C .1 0 0 .1 0 .5 C 0 .9 .1 1 .5 1 C .9 1 1 .9 1 .5 C 1 .1 .9 0 .5 0 Z" />
            </clipPath>
        </defs>
    </svg>

    <div id="vp-app" class="vp-app-root">
        <h2 class="vp-header">Adaptive Vector Studio</h2>

        <div id="vp-errorBox" class="vp-error"></div>

        <div class="vp-upload-area" id="vp-drop-zone">
            <div style="font-size: 2.5rem; margin-bottom: 0.5rem;">🖌️</div>
            <div style="font-size: 1.1rem; color: var(--vp-text-strong);"><strong>Upload Original Inkscape SVG</strong></div>
            <div style="font-size: 0.9rem; color: var(--vp-text-muted); margin-top: 0.5rem;">Select your master SVG to extract & configure Android layers.</div>
            <input type="file" id="vp-file-input" accept=".svg">
        </div>

        <div class="vp-workspace" id="vp-workspace" style="display: none;">
            
            <!-- Controls Panel -->
            <div class="vp-panel">
                <h3>
                    Text Styling 
                    <span style="font-size: 0.8rem; color: var(--vp-text-muted); font-weight: normal;">(Applies to Target 🎯)</span>
                </h3>

                <div class="vp-control-group">
                    <label>Target Color & Opacity (<span id="val-alpha">100</span>%)</label>
                    <div style="display: flex; gap: 0.5rem; align-items: center;">
                        <input type="color" id="ctrl-color" value="#0f0fc8" style="flex: 1; max-width: 60px; padding: 0;">
                        <input type="range" id="ctrl-alpha" min="0" max="100" value="100" style="flex: 2;">
                    </div>
                </div>
                
                <div class="vp-control-row">
                    <div class="vp-control-group">
                        <label>X Position (<span id="val-x">330</span>)</label>
                        <input type="range" id="ctrl-x" min="0" max="800" value="330">
                    </div>
                    <div class="vp-control-group">
                        <label>Y Position (<span id="val-y">610</span>)</label>
                        <input type="range" id="ctrl-y" min="0" max="800" value="610">
                    </div>
                </div>

                <div class="vp-control-group">
                    <label>Font Size (<span id="val-size">164</span>px)</label>
                    <input type="range" id="ctrl-size" min="10" max="400" value="164">
                </div>

                <h3 style="margin-top: 1.5rem;">Layer Extraction Logic</h3>
                
                <div class="vp-layer-list" id="vp-layer-container">
                    <div class="vp-layer-header">
                        <div class="vp-col-vis" title="Visible in Preview">👁️</div>
                        <div class="vp-col-bg" title="Export as Background">🖼️ BG</div>
                        <div class="vp-col-fg" title="Export as Foreground">🌟 FG</div>
                        <div class="vp-col-target" title="Target for Styling">🎯 Tgt</div>
                        <div class="vp-col-order" title="Change Z-Index Order">↕️ Order</div>
                        <div class="vp-col-name">📝 Layer Name & Content</div>
                    </div>
                    <!-- Layer rows dynamically injected here -->
                </div>

                <div style="display: flex; gap: 0.5rem;">
                    <button class="vp-btn vp-btn-outline" id="vp-btn-export-bg">Export BG (SVG)</button>
                    <button class="vp-btn" id="vp-btn-export-fg">Export FG (SVG)</button>
                </div>
            </div>

            <!-- Preview Panel -->
            <div class="vp-preview-section">
                <div class="vp-control-group" style="width: 100%; max-width: 280px; margin-bottom: 1rem; display: flex; flex-direction: column; gap: 0.5rem;">
                    <select id="vp-shape-select" style="margin-bottom: 0;">
                        <option value="vp-shape-circle">Mask: Circle</option>
                        <option value="vp-shape-squircle">Mask: Squircle</option>
                        <option value="vp-shape-rounded">Mask: Rounded Square</option>
                        <option value="vp-shape-square" selected>Mask: Square</option>
                        <option value="vp-shape-teardrop">Mask: Teardrop</option>
                    </select>
                    <label style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; cursor: pointer; font-size: 0.9rem; color: var(--vp-text-muted); margin: 0;">
                        <input type="checkbox" id="vp-preview-white-bg"> ⬜ Solid White Preview BG
                    </label>
                </div>

                <div class="vp-icon-viewport" id="vp-viewport">
                    <div class="vp-icon-mask vp-shape-square" id="vp-mask">
                        <div class="vp-layer" id="vp-layer-bg">
                            <span class="vp-layer-placeholder">BG</span>
                        </div>
                        <div class="vp-layer" id="vp-layer-fg">
                            <span class="vp-layer-placeholder">FG</span>
                        </div>
                    </div>
                </div>
                <p style="font-size: 0.85rem; color: var(--vp-text-muted); text-align: center;">Hover/Swipe to test Parallax Shift</p>
            </div>

        </div>
    </div>

    <script>
        (function() {
            // UI Elements
            const dropZone = document.getElementById('vp-drop-zone');
            const fileInput = document.getElementById('vp-file-input');
            const errorBox = document.getElementById('vp-errorBox');
            const workspace = document.getElementById('vp-workspace');
            
            const shapeSelect = document.getElementById('vp-shape-select');
            const mask = document.getElementById('vp-mask');
            const viewport = document.getElementById('vp-viewport');
            
            const layerBgContainer = document.getElementById('vp-layer-bg');
            const layerFgContainer = document.getElementById('vp-layer-fg');
            const layerListUI = document.getElementById('vp-layer-container');

            const ctrlColor = document.getElementById('ctrl-color');
            const ctrlAlpha = document.getElementById('ctrl-alpha');
            const ctrlX = document.getElementById('ctrl-x');
            const ctrlY = document.getElementById('ctrl-y');
            const ctrlSize = document.getElementById('ctrl-size');
            const inputs = [ctrlColor, ctrlAlpha, ctrlX, ctrlY, ctrlSize];
            
            const btnBgExport = document.getElementById('vp-btn-export-bg');
            const btnFgExport = document.getElementById('vp-btn-export-fg');

            // State
            let masterSVGDocument = null;
            let currentExportBg = "";
            let currentExportFg = "";
            let layersData = [];
            let activeTargetId = null;

            // --- Helper Functions ---
            const parseValue = (val, fallback) => {
                if (!val) return fallback;
                const parsed = parseInt(val.toString().replace(/[^\d.-]/g, ''));
                return isNaN(parsed) ? fallback : parsed;
            };

            const parseColor = (str) => {
                let hex = '#000000';
                let alpha = 1.0;
                if (!str) return { hex, alpha };
                
                str = str.trim();
                if (str.startsWith('#')) {
                    if (str.length === 4) hex = '#' + str[1]+str[1]+str[2]+str[2]+str[3]+str[3];
                    else if (str.length === 7) hex = str;
                    else if (str.length === 9) {
                        hex = str.substring(0, 7);
                        alpha = parseInt(str.substring(7, 9), 16) / 255;
                    } else hex = '#00cbff';
                } else if (str.startsWith('rgb')) {
                    // Browsers convert inline style="fill: #hex" to rgb() automatically. This translates it back.
                    const parts = str.match(/[\d.]+/g);
                    if (parts && parts.length >= 3) {
                        const r = parseInt(parts[0]).toString(16).padStart(2, '0');
                        const g = parseInt(parts[1]).toString(16).padStart(2, '0');
                        const b = parseInt(parts[2]).toString(16).padStart(2, '0');
                        hex = '#' + r + g + b;
                        if (parts.length === 4) alpha = parseFloat(parts[3]);
                    }
                }
                return { hex, alpha };
            };

            // --- Control Event Listeners ---
            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    const targetLayer = layersData.find(l => l.id === activeTargetId);
                    if (targetLayer) {
                        targetLayer.color = ctrlColor.value;
                        targetLayer.opacity = parseInt(ctrlAlpha.value) / 100;
                        targetLayer.x = ctrlX.value;
                        targetLayer.y = ctrlY.value;
                        targetLayer.size = ctrlSize.value;
                    }
                    if(input !== ctrlColor) {
                        document.getElementById('val-x').innerText = ctrlX.value;
                        document.getElementById('val-y').innerText = ctrlY.value;
                        document.getElementById('val-size').innerText = ctrlSize.value;
                        document.getElementById('val-alpha').innerText = ctrlAlpha.value;
                    }
                    renderPreview();
                });
            });

            shapeSelect.addEventListener('change', (e) => mask.className = 'vp-icon-mask ' + e.target.value);

            document.getElementById('vp-preview-white-bg').addEventListener('change', (e) => {
                if (e.target.checked) viewport.classList.add('vp-bg-white-override');
                else viewport.classList.remove('vp-bg-white-override');
            });

            // --- Parallax Logic ---
            const applyParallax = (clientX, clientY, rect) => {
                const deltaX = (clientX - rect.left - rect.width / 2) / (rect.width / 2); 
                const deltaY = (clientY - rect.top - rect.height / 2) / (rect.height / 2); 
                layerFgContainer.style.transform = `translate(${deltaX * 8}px, ${deltaY * 8}px) scale(1.02)`;
                layerBgContainer.style.transform = `translate(${deltaX * -4}px, ${deltaY * -4}px)`;
            };
            const resetParallax = () => {
                layerFgContainer.style.transform = `translate(0, 0) scale(1)`;
                layerBgContainer.style.transform = `translate(0, 0)`;
            };
            viewport.addEventListener('mousemove', (e) => applyParallax(e.clientX, e.clientY, viewport.getBoundingClientRect()));
            viewport.addEventListener('mouseleave', resetParallax);
            viewport.addEventListener('touchmove', (e) => { e.preventDefault(); applyParallax(e.touches[0].clientX, e.touches[0].clientY, viewport.getBoundingClientRect()); }, { passive: false });
            viewport.addEventListener('touchend', resetParallax);

            // --- File Upload Logic ---
            dropZone.addEventListener('click', () => fileInput.click());
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); }, false));
            ['dragenter', 'dragover'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.add('vp-dragover'), false));
            ['dragleave', 'drop'].forEach(e => dropZone.addEventListener(e, () => dropZone.classList.remove('vp-dragover'), false));
            dropZone.addEventListener('drop', (e) => { if (e.dataTransfer.files.length > 0) loadSVG(e.dataTransfer.files[0]); });
            fileInput.addEventListener('change', function() { if (this.files.length > 0) loadSVG(this.files[0]); });

            function loadSVG(file) {
                if (!file.name.toLowerCase().endsWith('.svg')) {
                    errorBox.textContent = "Please upload an Inkscape .svg file.";
                    errorBox.style.display = 'block';
                    return;
                }
                errorBox.style.display = 'none';

                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parser = new DOMParser();
                        masterSVGDocument = parser.parseFromString(e.target.result, "image/svg+xml");
                        if (masterSVGDocument.getElementsByTagName("parsererror").length > 0) throw new Error("Invalid XML format.");
                        
                        initLayersState();
                        buildLayerUI();
                        updateSlidersFromTarget();
                        workspace.style.display = 'grid';
                        renderPreview();
                    } catch (err) {
                        errorBox.textContent = `Parse Error: ${err.message}`;
                        errorBox.style.display = 'block';
                    }
                };
                reader.readAsText(file);
            }

            // --- State Initialization ---
            function initLayersState() {
                layersData = Array.from(masterSVGDocument.querySelectorAll('g'))
                    .filter(g => g.getAttribute('inkscape:groupmode') === 'layer')
                    .map(layer => {
                        const id = layer.getAttribute('id');
                        const label = layer.getAttribute('inkscape:label') || id;
                        const isHidden = (layer.getAttribute('display') === 'none' || layer.getAttribute('style')?.includes('display:none'));

                        let isText = false;
                        let textContent = "";
                        let color = "#000000";
                        let opacity = 1.0;
                        let x = 330, y = 610, size = 164;

                        // Smart Text Detection
                        const textNode = layer.querySelector('text, tspan');
                        const ariaNode = layer.querySelector('g[aria-label]');
                        
                        if (textNode || ariaNode) {
                            isText = true;
                            if (textNode) {
                                textContent = textNode.textContent.trim();
                                const parsed = parseColor(textNode.getAttribute('fill') || textNode.style?.fill);
                                color = parsed.hex;
                                opacity = parsed.alpha;
                                const explicitOp = textNode.getAttribute('fill-opacity') || textNode.style?.fillOpacity;
                                if (explicitOp !== null && explicitOp !== undefined && explicitOp !== "") opacity = parseFloat(explicitOp);
                                
                                x = parseValue(textNode.getAttribute('x'), x);
                                y = parseValue(textNode.getAttribute('y'), y);
                                size = parseValue(textNode.getAttribute('font-size') || textNode.style?.fontSize, size);
                            } else if (ariaNode) {
                                textContent = ariaNode.getAttribute('aria-label').trim();
                                const path = ariaNode.querySelector('path');
                                if (path) {
                                    const parsed = parseColor(path.getAttribute('fill') || path.style?.fill);
                                    color = parsed.hex;
                                    opacity = parsed.alpha;
                                    const explicitOp = path.getAttribute('fill-opacity') || path.style?.fillOpacity;
                                    if (explicitOp !== null && explicitOp !== undefined && explicitOp !== "") opacity = parseFloat(explicitOp);
                                }
                            }
                        }

                        return { id, label, isText, textContent, color, opacity, x, y, size, isVis: !isHidden, isBg: false, isFg: !isHidden };
                    });

                // Infer default Background & Active Target
                const defaultBg = layersData.find(l => l.label.toLowerCase().includes('bg') || l.label.toLowerCase().includes('background') || l.id === 'layer3') || layersData[0];
                if (defaultBg) {
                    defaultBg.isBg = true;
                    defaultBg.isFg = false;
                }

                const defaultTarget = layersData.find(l => l.isText);
                activeTargetId = defaultTarget ? defaultTarget.id : null;
            }

            // --- UI Builders ---
            function updateSlidersFromTarget() {
                const target = layersData.find(l => l.id === activeTargetId);
                if (!target) {
                    inputs.forEach(i => { i.disabled = true; i.style.opacity = '0.5'; });
                    return;
                }
                inputs.forEach(i => { i.disabled = false; i.style.opacity = '1'; });
                ctrlColor.value = target.color;
                ctrlAlpha.value = Math.round(target.opacity * 100);
                ctrlX.value = target.x;
                ctrlY.value = target.y;
                ctrlSize.value = target.size;
                
                document.getElementById('val-alpha').innerText = ctrlAlpha.value;
                document.getElementById('val-x').innerText = target.x;
                document.getElementById('val-y').innerText = target.y;
                document.getElementById('val-size').innerText = target.size;
            }

            function buildLayerUI() {
                // Safely grab the full header DOM element instead of splitting a string
                const headerNode = layerListUI.querySelector('.vp-layer-header');
                layerListUI.innerHTML = '';
                if (headerNode) layerListUI.appendChild(headerNode);

                if (layersData.length === 0) {
                    layerListUI.innerHTML += '<div class="vp-layer-item">No layers detected.</div>';
                    return;
                }

                layersData.forEach((lData, index) => {
                    const div = document.createElement('div');
                    div.className = 'vp-layer-item';
                    
                    // 1. Vis (Preview & Export) Toggle
                    const colVis = document.createElement('div');
                    colVis.className = 'vp-col-vis';
                    const chkVis = document.createElement('input');
                    chkVis.type = 'checkbox';
                    chkVis.checked = lData.isVis;
                    chkVis.title = "Toggle Visibility";
                    chkVis.addEventListener('change', e => { lData.isVis = e.target.checked; renderPreview(); });
                    colVis.appendChild(chkVis);

                    // 2. BG Checkbox (Mutual Exclusivity)
                    const colBg = document.createElement('div');
                    colBg.className = 'vp-col-bg';
                    const chkBg = document.createElement('input');
                    chkBg.type = 'checkbox';
                    chkBg.checked = lData.isBg;
                    
                    // 3. FG Checkbox (Mutual Exclusivity)
                    const colFg = document.createElement('div');
                    colFg.className = 'vp-col-fg';
                    const chkFg = document.createElement('input');
                    chkFg.type = 'checkbox';
                    chkFg.checked = lData.isFg;
                    
                    // Wire Exclusivity Logic
                    chkBg.addEventListener('change', e => { 
                        lData.isBg = e.target.checked; 
                        if (lData.isBg) {
                            lData.isFg = false;
                            chkFg.checked = false;
                        }
                        renderPreview(); 
                    });
                    
                    chkFg.addEventListener('change', e => { 
                        lData.isFg = e.target.checked; 
                        if (lData.isFg) {
                            lData.isBg = false;
                            chkBg.checked = false;
                        }
                        renderPreview(); 
                    });

                    colBg.appendChild(chkBg);
                    colFg.appendChild(chkFg);

                    // 4. Target Radio
                    const colTarget = document.createElement('div');
                    colTarget.className = 'vp-col-target';
                    if (lData.isText) {
                        const radTarget = document.createElement('input');
                        radTarget.type = 'radio';
                        radTarget.name = 'target-group';
                        radTarget.checked = (lData.id === activeTargetId);
                        radTarget.addEventListener('change', () => { activeTargetId = lData.id; updateSlidersFromTarget(); });
                        colTarget.appendChild(radTarget);
                    }

                    // 4.5 Layer Order Buttons
                    const colOrder = document.createElement('div');
                    colOrder.className = 'vp-col-order';
                    
                    const btnUp = document.createElement('button');
                    btnUp.className = 'vp-btn-icon';
                    btnUp.innerHTML = '▲';
                    btnUp.title = 'Move Back (Render Earlier)';
                    btnUp.disabled = index === 0;
                    btnUp.onclick = () => moveLayer(index, -1);

                    const btnDown = document.createElement('button');
                    btnDown.className = 'vp-btn-icon';
                    btnDown.innerHTML = '▼';
                    btnDown.title = 'Move Front (Render Later)';
                    btnDown.disabled = index === layersData.length - 1;
                    btnDown.onclick = () => moveLayer(index, 1);

                    colOrder.appendChild(btnUp);
                    colOrder.appendChild(btnDown);

                    // 5. Name & Inline Text Input
                    const colName = document.createElement('div');
                    colName.className = 'vp-col-name';
                    const lbl = document.createElement('div');
                    lbl.className = 'vp-layer-label';
                    lbl.textContent = lData.label;
                    lbl.title = lData.label;
                    colName.appendChild(lbl);

                    if (lData.isText) {
                        const txtInput = document.createElement('input');
                        txtInput.type = 'text';
                        txtInput.value = lData.textContent;
                        txtInput.className = 'vp-text-inline';
                        txtInput.placeholder = 'Text...';
                        txtInput.addEventListener('input', e => { lData.textContent = e.target.value; renderPreview(); });
                        colName.appendChild(txtInput);
                    }

                    div.appendChild(colVis);
                    div.appendChild(colBg);
                    div.appendChild(colFg);
                    div.appendChild(colTarget);
                    div.appendChild(colOrder);
                    div.appendChild(colName);
                    layerListUI.appendChild(div);
                });
            }

            function moveLayer(index, direction) {
                const targetIndex = index + direction;
                if (targetIndex < 0 || targetIndex >= layersData.length) return;
                
                // Swap the layers array entries
                const temp = layersData[index];
                layersData[index] = layersData[targetIndex];
                layersData[targetIndex] = temp;
                
                buildLayerUI();
                renderPreview();
            }

            // --- Rendering Engine ---
            function renderPreview() {
                if (!masterSVGDocument) return;
                const clonedDoc = masterSVGDocument.cloneNode(true);
                const svgRoot = clonedDoc.documentElement;

                // Reorder physical SVG nodes in the DOM to match the new layersData order
                layersData.forEach(lData => {
                    const layerNode = clonedDoc.getElementById(lData.id);
                    if (layerNode) svgRoot.appendChild(layerNode);
                });
                
                // Apply dynamic styles to TEXT layers
                layersData.filter(l => l.isText).forEach(lData => {
                    const layerNode = clonedDoc.getElementById(lData.id);
                    if (!layerNode) return;

                    // Unwrap Inkscape aria-label paths to native text nodes
                    const gLabels = layerNode.querySelectorAll('g[aria-label]');
                    gLabels.forEach(g => {
                        const t = clonedDoc.createElementNS('http://www.w3.org/2000/svg', 'text');
                        g.parentNode.replaceChild(t, g);
                    });

                    // Format nodes
                    const texts = layerNode.querySelectorAll('text');
                    texts.forEach(t => {
                        t.textContent = lData.textContent;
                        t.setAttribute('x', lData.x);
                        t.setAttribute('y', lData.y);
                        
                        t.setAttribute('fill', lData.color);
                        t.setAttribute('fill-opacity', lData.opacity);
                        t.setAttribute('font-size', lData.size + 'px');
                        t.setAttribute('font-family', "'Arial', sans-serif");
                        t.setAttribute('font-weight', "900");
                        t.setAttribute('letter-spacing', "-5");

                        t.style.removeProperty('fill');
                        t.style.removeProperty('fill-opacity');
                        t.style.fill = lData.color; 
                        t.style.fillOpacity = lData.opacity;
                        t.style.fontSize = lData.size + 'px';
                    });
                });

                // 1. Build Export Documents (Must be Visible AND flagged as BG/FG)
                const bgDoc = clonedDoc.cloneNode(true);
                Array.from(bgDoc.querySelectorAll('g')).filter(g => g.getAttribute('inkscape:groupmode') === 'layer').forEach(layer => {
                    const lData = layersData.find(l => l.id === layer.getAttribute('id'));
                    if (!lData || !lData.isBg || !lData.isVis) layer.parentNode.removeChild(layer);
                    else { layer.removeAttribute('display'); layer.style.display = 'inline'; }
                });

                const fgDoc = clonedDoc.cloneNode(true);
                Array.from(fgDoc.querySelectorAll('g')).filter(g => g.getAttribute('inkscape:groupmode') === 'layer').forEach(layer => {
                    const lData = layersData.find(l => l.id === layer.getAttribute('id'));
                    if (!lData || !lData.isFg || !lData.isVis) layer.parentNode.removeChild(layer);
                    else { layer.removeAttribute('display'); layer.style.display = 'inline'; }
                });

                // 2. Build Visual Preview Masks (Identical to exports, must be Vis + Bg/Fg)
                const prevBgDoc = clonedDoc.cloneNode(true);
                Array.from(prevBgDoc.querySelectorAll('g')).filter(g => g.getAttribute('inkscape:groupmode') === 'layer').forEach(layer => {
                    const lData = layersData.find(l => l.id === layer.getAttribute('id'));
                    if (!lData || !lData.isBg || !lData.isVis) layer.parentNode.removeChild(layer);
                    else { layer.removeAttribute('display'); layer.style.display = 'inline'; }
                });

                const prevFgDoc = clonedDoc.cloneNode(true);
                Array.from(prevFgDoc.querySelectorAll('g')).filter(g => g.getAttribute('inkscape:groupmode') === 'layer').forEach(layer => {
                    const lData = layersData.find(l => l.id === layer.getAttribute('id'));
                    if (!lData || !lData.isFg || !lData.isVis) layer.parentNode.removeChild(layer);
                    else { layer.removeAttribute('display'); layer.style.display = 'inline'; }
                });

                const serializer = new XMLSerializer();
                currentExportBg = serializer.serializeToString(bgDoc.documentElement);
                currentExportFg = serializer.serializeToString(fgDoc.documentElement);
                layerBgContainer.innerHTML = serializer.serializeToString(prevBgDoc.documentElement);
                layerFgContainer.innerHTML = serializer.serializeToString(prevFgDoc.documentElement);

                // 3. Export Safety Block (Disable export buttons if their respective target pool is completely empty/hidden)
                const hasBg = layersData.some(l => l.isBg && l.isVis);
                if (!hasBg) {
                    btnBgExport.disabled = true;
                    btnBgExport.classList.add('vp-disabled-btn');
                    btnBgExport.innerText = 'Export BG (Empty)';
                } else {
                    btnBgExport.disabled = false;
                    btnBgExport.classList.remove('vp-disabled-btn');
                    btnBgExport.innerText = 'Export BG (SVG)';
                }

                const hasFg = layersData.some(l => l.isFg && l.isVis);
                if (!hasFg) {
                    btnFgExport.disabled = true;
                    btnFgExport.classList.add('vp-disabled-btn');
                    btnFgExport.innerText = 'Export FG (Empty)';
                } else {
                    btnFgExport.disabled = false;
                    btnFgExport.classList.remove('vp-disabled-btn');
                    btnFgExport.innerText = 'Export FG (SVG)';
                }
            }

            // --- Android Vector Sanitizer & Exporter ---
            const sanitizeForAndroid = (svgStr) => {
                let s = svgStr;
                s = s.replace(/<defs[^>]*>[\s\S]*?<\/defs>/gi, '');
                s = s.replace(/<metadata[^>]*>[\s\S]*?<\/metadata>/gi, '');
                s = s.replace(/<sodipodi:namedview[^>]*>[\s\S]*?<\/sodipodi:namedview>/gi, '');
                s = s.replace(/<clipPath[^>]*>[\s\S]*?<\/clipPath>/gi, '');
                s = s.replace(/\s*clip-path="[^"]+"/gi, '');
                return s;
            };

            const downloadSVG = (content, filename) => {
                const blob = new Blob([sanitizeForAndroid(content)], { type: 'image/svg+xml' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };

            btnBgExport.addEventListener('click', () => { if (currentExportBg && !btnBgExport.disabled) downloadSVG(currentExportBg, 'ic_background.svg'); });
            btnFgExport.addEventListener('click', () => { if (currentExportFg && !btnFgExport.disabled) downloadSVG(currentExportFg, 'ic_foreground.svg'); });

        })();
    </script>
