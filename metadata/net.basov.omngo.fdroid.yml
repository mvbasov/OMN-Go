  - Development
  - Note
License: MIT
AuthorName: Mikhail Basov
WebSite: https://github.com/mvbasov/OMN-Go
SourceCode: https://github.com/mvbasov/OMN-Go
IssueTracker: https://github.com/mvbasov/OMN-Go/issues
Changelog: https://github.com/mvbasov/OMN-Go/blob/master/fastlane/metadata/android/en-US/changelogs/%c.txt

# No ads, analytics, or trackers; git sync and LAN sharing both point at
# user-configured, self-hostable endpoints rather than a fixed
# proprietary service, so neither qualifies for the Tethered/NonFreeNet
# anti-features. Leaving this present-but-empty as an explicit "checked,
# none apply" marker rather than omitting the field silently.
AntiFeatures:

RepoType: git
Repo: https://github.com/mvbasov/OMN-Go.git

Builds:
  - versionName: '1.11.21-fdroid'
    versionCode: 111211
    commit: v1.11.21f
    subdir: android
    ndk: 25.2.9519653
    output: app/build/outputs/apk/fdroid/release/omn-go-v1.11.21-fdroid-fdroid-armeabi-v7a-release.apk
    prebuild:
      - export GOROOT_BOOTSTRAP_DIR=/tmp/omngo-go-toolchain
      - curl -fsSL -o /tmp/go.tar.gz https://go.dev/dl/go1.26.0.linux-amd64.tar.gz
      - echo "aac1b08a0fb0c4e0a7c1555beb7b59180b05dfc5a3d62e40e9de90cd42f88235  /tmp/go.tar.gz" | sha256sum -c -
      - mkdir -p $GOROOT_BOOTSTRAP_DIR
      - tar -C $GOROOT_BOOTSTRAP_DIR --strip-components=1 -xzf /tmp/go.tar.gz
      - export PATH=$GOROOT_BOOTSTRAP_DIR/bin:$PATH
      - export GOPATH=/tmp/omngo-go-path
      - export PATH=$GOPATH/bin:$PATH
      - cd ..
      - sh android/fdroid_fetch_assets.sh
      - go get -tool golang.org/x/mobile/cmd/gobind golang.org/x/mobile/cmd/gomobile
      - go mod tidy
      - go install golang.org/x/mobile/cmd/gobind
      - go install golang.org/x/mobile/cmd/gomobile
      - gomobile init
      - mkdir -p android/app/libs
      - gomobile bind -target=android -androidapi 24 -javapkg net.basov.omngo -ldflags="-s -w" -o android/app/libs/omngo.aar ./backend
      - cd android
    gradle:
      - fdroid
    scanignore:
      - android/app/libs/omngo.aar
      - android/app/libs/omngo-sources.jar
      - local/icons/res-drawable.zip

