stages:
  - build
  - upload
  - release

# Global variables must live outside the default block
variables:
  DOCKER_TLS_CERTDIR: "/certs"
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/omn-go/${APP_VERSION}"

# Default options applied globally to jobs
default:
  image: docker:24.0.7
  services:
    - docker:24.0.7-dind

build_job:
  stage: build
  allow_failure: false
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "DS"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "master"
    - if: $CI_COMMIT_TAG =~ /^v/
  cache:
    key: "omngo-build-cache"
    paths:
      - .buildx-cache

  # FIXED: Wait for the Docker-in-Docker service daemon to become active before starting build steps
  before_script:
    - |
      echo "Waiting for Docker daemon to start..."
      for i in $(seq 1 30); do
        if docker info >/dev/null 2>&1; then
          echo "Docker daemon is ready!"
          break
        fi
        echo "Still waiting..."
        sleep 1
      done

  script:
    # FIXED: create an explicit docker context so buildx picks up the DinD TLS
    # endpoint instead of failing to load TLS data from the environment.
    - docker context create builder
    - docker buildx create --use --driver docker-container --name omngo-builder builder
    # Decode the keystore to a path OUTSIDE the build context (/tmp), so it is
    # never captured by `COPY . .` and never baked into an image layer. It is
    # handed to the build only as a BuildKit secret.
    - echo "${KEYSTORE_BASE64}" | base64 -d > /tmp/omn-go.keystore
    # FIXED: export ONLY the build outputs to ./artifacts via the `export`
    # stage, instead of --load'ing the multi-GB toolchain image into the
    # Docker daemon (that import step ran the small runner out of disk).
    - |
      docker buildx build \
        -f Dockerfile.ci \
        --target export \
        --output type=local,dest=artifacts \
        --secret id=keystore,src=/tmp/omn-go.keystore \
        --secret id=keystore_password,env=KEYSTORE_PASSWORD \
        --secret id=key_alias,env=KEY_ALIAS \
        --secret id=key_password,env=KEY_PASSWORD \
        --cache-from type=local,src=.buildx-cache \
        --cache-to type=local,dest=.buildx-cache,mode=max \
        .
    - rm -f /tmp/omn-go.keystore
    # FIXED: docker image is Alpine/BusyBox — grep has no -P/\K. Use awk instead.
    - VERSION=$(awk -F'"' '/APP_VERSION/{print $2; exit}' backend/version.go)
    - echo "APP_VERSION=$VERSION" >> build.env
    - echo "App version is $VERSION"
    - ls -la artifacts/
  artifacts:
    name: "omn-go-artifacts"
    paths:
      - artifacts/
    reports:
      dotenv: build.env

upload_job:
  stage: upload
  image: badouralix/curl-jq:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  dependencies:
    - build_job
  script:
    - echo "Generating SHA256 checksums and uploading all assets..."
    - echo "[" > assets.json
    - first=true

    - |
      for filepath in artifacts/*.apk artifacts/omn-go-*-desktop-*; do
        if [ -f "$filepath" ]; then
          filename=$(basename "$filepath")
          sha256sum "$filepath" | awk '{print $1}' > "${filepath}.sha256"
          sha_filename="${filename}.sha256"

          echo "Uploading $filename..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "$filepath" \
               "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/omn-go/${APP_VERSION}/${filename}"

          echo "Uploading checksum for $filename..."
          curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
               --upload-file "${filepath}.sha256" \
               "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/omn-go/${APP_VERSION}/${sha_filename}"

          display_name=$(echo "$filename" | sed 's/omn-go-//g' | sed 's/-release//g')

          if [ "$first" = true ]; then
            first=false
          else
            echo "," >> assets.json
          fi

          echo "{\"name\":\"📦 $display_name\",\"url\":\"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/omn-go/${APP_VERSION}/${filename}\",\"link_type\":\"package\"}" >> assets.json
          echo "," >> assets.json
          echo "{\"name\":\"🔑 $display_name (SHA256)\",\"url\":\"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/omn-go/${APP_VERSION}/${sha_filename}\",\"link_type\":\"other\"}" >> assets.json
        fi
      done

    - echo "]" >> assets.json
    - cat assets.json
  artifacts:
    paths:
      - assets.json
    reports:
      dotenv: build.env

release_job:
  stage: release
  image: registry.gitlab.com/gitlab-org/cli:latest
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
  dependencies:
    - upload_job
  script:
    - echo "Forging release layout for version $APP_VERSION..."
    - |
      glab release create "$CI_COMMIT_TAG" \
        --name "OMN-Go $APP_VERSION" \
        --notes "Release created automatically by GitLab CI/CD pipeline. Use the associated SHA256 links below to verify package integrity." \
        --assets-links "$(cat assets.json)"
